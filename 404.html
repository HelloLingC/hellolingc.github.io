<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f4;
            color: #333;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }

        h1 {
            font-size: 4em;
            margin-bottom: 10px;
            color: #333;
        }

        p {
            font-size: 1.2em;
            color: #666;
        }

        button {
            display: inline-block;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            border: 2px solid #3498db;
            border-radius: 5px;
            color: #ffffff;
            background-color: #3498db;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #2980b9;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>404 Not Found</h1>
        <p>Hi~ It seems like you're running to a void.</p>
        <p>Maybe you are tryin' to visit MoonLab Mini, instead of MoonLab.</p>
        <p>Try to click the button below to transefer your request to MoonLab Mini</p>
        <button id="navi">NAVIGATE TO MOONLAB MINI</button>
    </div>
    <script>
        const path = window.location.pathname;
        // const mod_path = path.replace("moonlab.top", "mini.moonlab.top");
        const mod_path = path.replace("Hexo", "mini.moonlab.top");
        document.addEventListener("DOMContentLoaded", function () {
            document.getElementById("navi").addEventListener("click", function () {
                window.location.href = mod_path;
            });
        });
    </script>
</body>

</html>
